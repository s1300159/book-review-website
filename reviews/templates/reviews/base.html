    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Book Review Website{% endblock %}</title>
  </head>
  <body>
    <header>
      <h1>
        <a href="{% url 'reviews:home' %}">Book Review Website</a>
      </h1>
      <nav aria-label="Primary navigation">
